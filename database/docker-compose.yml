services:
  postgres:
    image: postgres:16

    container_name: kriterika_db

    environment:
      POSTGRES_DB: kriterika
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 12345

    ports:
      - "5433:5432"

    volumes:
      - kriterika_pgdata:/var/lib/postgresql/data

    restart: unless-stopped

volumes:
  kriterika_pgdata:
